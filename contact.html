<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us — RepoForge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
  :root {
    --bg: #07080f;
    --bg-2: #0d1020;
    --card: #11142a;
    --border: #1f2342;
    --fg: #e8ebf7;
    --muted: #8b91b8;
    --accent: #7c5cff;
    --accent-2: #00e5a8;
    --accent-3: #ff4d8d;
  }
  body {
    font-family: 'Sora', sans-serif;
    background: var(--bg);
    color: var(--fg);
    overflow-x: hidden;
  }
  .grid-bg {
    background-image:
      linear-gradient(rgba(124,92,255,0.07) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,92,255,0.07) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
  }
  .glass {
    background: rgba(17, 20, 42, 0.6);
    backdrop-filter: blur(20px);
    border: 1px solid var(--border);
  }
  .btn-primary {
    background: linear-gradient(135deg, #7c5cff 0%, #5b3fd6 100%);
  }
</style>
</head>
<body class="relative min-h-screen text-[var(--fg)]">
<div class="fixed inset-0 grid-bg pointer-events-none z-0"></div>

<nav class="fixed top-0 left-0 right-0 z-50 glass">
  <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
    <a href="index.html" class="flex items-center gap-2.5">
      <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-[#7c5cff] to-[#00e5a8] flex items-center justify-center">
        <i data-lucide="box" class="w-5 h-5 text-white"></i>
      </div>
      <span class="font-bold text-xl tracking-tight">RepoForge</span>
    </a>
  </div>
</nav>

<main class="relative z-10 pt-32 pb-20 px-6">
  <div class="max-w-2xl mx-auto">
    <h1 class="text-5xl font-extrabold tracking-tight mb-4">Get in touch</h1>
    <p class="text-[var(--muted)] mb-12">Have questions about Pro plans or need custom integration help? We're here to help.</p>

    <form class="glass rounded-3xl p-8 space-y-6">
      <div class="grid md:grid-cols-2 gap-6">
        <div>
          <label class="block text-xs uppercase tracking-widest text-[var(--muted)] mb-2">Name</label>
          <input type="text" placeholder="John Doe" class="w-full bg-[var(--bg)] border border-[var(--border)] rounded-xl px-4 py-3 outline-none focus:border-[var(--accent)] transition">
        </div>
        <div>
          <label class="block text-xs uppercase tracking-widest text-[var(--muted)] mb-2">Email</label>
          <input type="email" placeholder="john@example.com" class="w-full bg-[var(--bg)] border border-[var(--border)] rounded-xl px-4 py-3 outline-none focus:border-[var(--accent)] transition">
        </div>
      </div>
      <div>
        <label class="block text-xs uppercase tracking-widest text-[var(--muted)] mb-2">Subject</label>
        <select class="w-full bg-[var(--bg)] border border-[var(--border)] rounded-xl px-4 py-3 outline-none focus:border-[var(--accent)] transition appearance-none">
          <option>General Inquiry</option>
          <option>Pro Plan Support</option>
          <option>API Access</option>
          <option>Bug Report</option>
        </select>
      </div>
      <div>
        <label class="block text-xs uppercase tracking-widest text-[var(--muted)] mb-2">Message</label>
        <textarea rows="5" placeholder="How can we help?" class="w-full bg-[var(--bg)] border border-[var(--border)] rounded-xl px-4 py-3 outline-none focus:border-[var(--accent)] transition"></textarea>
      </div>
      <button type="submit" class="w-full btn-primary py-4 rounded-xl font-semibold text-white shadow-lg shadow-[#7c5cff]/20 hover:scale-[1.02] transition">
        Send Message
      </button>
    </form>

    <div class="mt-12 flex flex-col md:flex-row items-center justify-center gap-8 text-sm text-[var(--muted)]">
      <div class="flex items-center gap-2">
        <i data-lucide="mail" class="w-4 h-4 text-[var(--accent-2)]"></i>
        <span>hello@repoforge.dev</span>
      </div>
      <div class="flex items-center gap-2">
        <i data-lucide="twitter" class="w-4 h-4 text-[var(--accent-2)]"></i>
        <span>@repoforge</span>
      </div>
    </div>
  </div>
</main>

<script>lucide.createIcons();</script>
</body>
</html>
